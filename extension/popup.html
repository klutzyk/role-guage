<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RoleGuage</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">RoleGuage</p>
        <h1>Match this job</h1>
        <p>Use selected text first, or extract the visible job page.</p>
      </header>

      <section class="panel">
        <label for="resume">Your resume</label>
        <textarea id="resume" placeholder="Paste your resume once. It stays in Chrome local storage."></textarea>
        <div class="row">
          <button id="saveResume" class="secondary" type="button">Save resume</button>
          <button id="clearResume" class="ghost" type="button">Clear</button>
        </div>
      </section>

      <section class="panel">
        <div class="sectionHead">
          <label for="jobText">Job text</label>
          <button id="extractJob" class="secondary compact" type="button">Extract page</button>
        </div>
        <textarea id="jobText" placeholder="Open a job ad, highlight the JD if needed, then click Extract page."></textarea>
        <button id="analyze" class="primary" type="button">Analyze fit</button>
      </section>

      <p id="status" class="status">Ready.</p>

      <section id="result" class="result hidden" aria-live="polite">
        <div class="scoreRow">
          <div>
            <p class="eyebrow">Recommended move</p>
            <h2 id="decision">-</h2>
            <p id="level" class="muted">-</p>
          </div>
          <div id="score" class="score">-</div>
        </div>

        <p id="summary" class="summary"></p>

        <div class="callout">
          <p class="eyebrow">Next best action</p>
          <p id="nextStep"></p>
        </div>

        <div class="split">
          <div>
            <p class="label">Matched</p>
            <div id="matchedSkills" class="chips"></div>
          </div>
          <div>
            <p class="label">Gaps</p>
            <div id="missingSkills" class="chips warning"></div>
          </div>
        </div>

        <div>
          <p class="label">Resume bullets</p>
          <ul id="resumeBullets"></ul>
        </div>

        <div class="row">
          <button id="copyResult" class="secondary" type="button">Copy report</button>
          <button id="openApp" class="ghost" type="button">Open app</button>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
